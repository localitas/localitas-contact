{{define "sidebar_list"}}
<div class="sidebar-list" id="contacts-sidebar-list">
    {{range .Contacts}}
    <div class="sidebar-item {{if eq $.SelectedContactID .ID}}active-purple{{end}}"
         hx-get="partials/editor/{{.ID}}"
         hx-target="#main-widget-container"
         hx-swap="innerHTML"
         hx-push-url="?id={{.ID}}">
        <div class="sidebar-item-icon">
            <i data-lucide="user" style="width: 16px; height: 16px;"></i>
        </div>
        <div class="sidebar-item-info">
            <div class="sidebar-item-title">
                <span>{{if .Name}}{{.Name}}{{else}}Unnamed{{end}}</span>
            </div>
            {{if .Company}}<div class="sidebar-item-meta">{{.Company}}</div>{{end}}
        </div>
    </div>
    {{else}}
    <div class="text-center py-8 text-secondary">
        <i data-lucide="users" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
        <p>No contacts yet</p>
    </div>
    {{end}}
</div>
{{end}}
